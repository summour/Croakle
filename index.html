<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Croakle Habit and Mood Tracker" />
  <title>Croakle Habit & Mood</title>
  <link rel="icon" type="image/svg+xml" href="./public/croakle-logo.svg" />
  <link rel="apple-touch-icon" href="./public/croakle-logo.svg" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Croakle" />
  <link rel="stylesheet" href="premium.css" />
  <link rel="stylesheet" href="best-scroll.css" />
</head>
<body>
  <main class="CroakleHabitMoodShell" aria-label="Croakle Habit and Mood Tracker">
    <section class="CroaklePage CroakleMenuPage CroaklePageActive" data-page="menu">
      <div class="CroakleHeroHeader">
        <div>
          <p class="CroakleEyebrow">Croakle</p>
          <h1>Habit & Mood</h1>
        </div>
        <button class="CroakleRoundButton" type="button" aria-label="เมนู">☰</button>
      </div>

      <div class="CroakleEmptyPanel">
        <p class="CroakleEmptyTitle">Choose a view</p>
        <p class="CroakleEmptyText">Track habits, review monthly progress, and check mood patterns.</p>
      </div>

      <nav class="CroakleMenuList" aria-label="Habit mood menu">
        <button type="button" data-page-target="track"><span>Track progress</span><span>›</span></button>
        <button type="button" data-page-target="best"><span>Best habits</span><span>›</span></button>
        <button type="button" data-page-target="mood"><span>Top moods</span><span>›</span></button>
      </nav>
    </section>

    <section class="CroaklePage" data-page="track">
      <article class="CroakleCard" aria-label="Track progress calendar">
        <div class="CroakleMonthHeader">
          <button type="button" data-month-target="track" data-month-action="previous" aria-label="เดือนก่อนหน้า">‹</button>
          <strong id="CroakleTrackMonth">June 2024</strong>
          <button type="button" data-month-target="track" data-month-action="next" aria-label="เดือนถัดไป">›</button>
        </div>

        <div class="CroakleSevenGrid CroakleWeekHeader" aria-hidden="true">
          <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
        </div>

        <div class="CroakleSevenGrid CroakleDateRow" id="CroakleTrackDates" aria-hidden="true"></div>
        <div class="CroakleSevenGrid CroakleMoodPreview" id="CroakleTrackMoodPreview" aria-label="Mood preview"></div>
        <div class="CroakleDivider" aria-hidden="true"></div>

        <div class="CroakleTrackActions">
          <button class="CroakleAddHabitButton" id="CroakleOpenAddHabit" type="button">+ Add Habit</button>
          <button class="CroakleSecondaryActionButton" id="CroakleOpenReorderHabit" type="button">Reorder</button>
        </div>

        <div class="CroakleHabitList" id="CroakleTrackList"></div>
      </article>
    </section>

    <section class="CroaklePage" data-page="best">
      <article class="CroakleCard" aria-label="Best habits summary">
        <div class="CroakleMonthHeader">
          <button type="button" data-month-target="best" data-month-action="previous" aria-label="เดือนก่อนหน้า">‹</button>
          <strong id="CroakleBestMonth">May 2024</strong>
          <button type="button" data-month-target="best" data-month-action="next" aria-label="เดือนถัดไป">›</button>
        </div>

        <div class="CroakleBestHeader" aria-hidden="true">
          <span>Habit name</span>
          <span>Monthly Goal %</span>
          <span>Month</span>
          <span>Lifetime</span>
        </div>

        <div class="CroakleBestList" id="CroakleBestList"></div>
      </article>
    </section>

    <section class="CroaklePage" data-page="mood">
      <article class="CroakleCard" aria-label="Top moods calendar">
        <div class="CroakleMonthHeader">
          <button type="button" data-month-target="mood" data-month-action="previous" aria-label="เดือนก่อนหน้า">‹</button>
          <strong id="CroakleMoodMonth">May 2024</strong>
          <button type="button" data-month-target="mood" data-month-action="next" aria-label="เดือนถัดไป">›</button>
        </div>

        <div class="CroakleSevenGrid CroakleCalendarHeader" aria-hidden="true">
          <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
        </div>

        <div class="CroakleMoodCalendar" id="CroakleMoodCalendar"></div>

        <div class="CroakleTopMoodRow">
          <strong>Top Mood(s) of the Month:</strong>
          <div aria-label="Top moods"></div>
        </div>
      </article>
    </section>

    <footer class="CroakleBottomNav" aria-label="Quick navigation">
      <button type="button" data-page-target="menu">Menu</button>
      <button type="button" data-page-target="track">Track</button>
      <button type="button" data-page-target="best">Best</button>
      <button type="button" data-page-target="mood">Mood</button>
    </footer>

    <dialog class="CroakleAddHabitDialog" id="CroakleAddHabitDialog" aria-labelledby="CroakleAddHabitTitle">
      <form class="CroakleAddHabitForm" id="CroakleAddHabitForm" method="dialog">
        <header class="CroakleAddHabitHeader">
          <h2 id="CroakleAddHabitTitle">Add Habit</h2>
          <button type="button" id="CroakleCloseAddHabit" aria-label="ปิด">×</button>
        </header>

        <label class="CroakleField">
          <span>New Habit</span>
          <input id="CroakleHabitNameInput" name="habitName" type="text" placeholder="e.g., Gym" autocomplete="off" required />
        </label>

        <label class="CroakleField">
          <span>Goal Per Week</span>
          <input id="CroakleHabitGoalInput" name="habitGoal" type="number" min="1" max="7" inputmode="numeric" placeholder="e.g., 3" required />
        </label>

        <label class="CroakleField">
          <span>Description</span>
          <textarea id="CroakleHabitDescriptionInput" name="habitDescription" rows="3" placeholder="e.g., 10 push ups"></textarea>
        </label>

        <fieldset class="CroaklePriorityField">
          <legend>Priority</legend>
          <label><input type="radio" name="habitPriority" value="high" checked /><span>High</span></label>
          <label><input type="radio" name="habitPriority" value="medium" /><span>Medium</span></label>
          <label><input type="radio" name="habitPriority" value="low" /><span>Low</span></label>
        </fieldset>

        <button class="CroakleConfirmHabitButton" type="submit">Confirm</button>
      </form>
    </dialog>

    <dialog class="CroakleAddHabitDialog" id="CroakleReorderHabitDialog" aria-labelledby="CroakleReorderHabitTitle">
      <div class="CroakleAddHabitForm">
        <header class="CroakleAddHabitHeader">
          <h2 id="CroakleReorderHabitTitle">Reorder Habits</h2>
          <button type="button" id="CroakleCloseReorderHabit" aria-label="ปิด">×</button>
        </header>

        <div class="CroakleReorderList" id="CroakleReorderList"></div>

        <button class="CroakleConfirmHabitButton" id="CroakleCloseReorderHabitDone" type="button">Done</button>
      </div>
    </dialog>

    <dialog class="CroakleAddHabitDialog" id="CroakleHabitDetailDialog" aria-labelledby="CroakleHabitDetailTitle">
      <form class="CroakleAddHabitForm" id="CroakleHabitDetailForm" method="dialog">
        <header class="CroakleDetailHeader">
          <button class="CroakleDeleteHabitButton" type="button" id="CroakleDeleteHabitButton">Delete</button>
          <h2 id="CroakleHabitDetailTitle">Habit Details</h2>
          <button type="button" id="CroakleCloseHabitDetail" aria-label="ปิด">×</button>
        </header>

        <input id="CroakleHabitDetailIndex" name="habitIndex" type="hidden" />

        <label class="CroakleField">
          <span>Habit name</span>
          <input id="CroakleHabitDetailName" name="habitName" type="text" autocomplete="off" required />
        </label>

        <label class="CroakleField">
          <span>Goal Per Week</span>
          <input id="CroakleHabitDetailGoal" name="habitGoal" type="number" min="1" max="7" inputmode="numeric" required />
        </label>

        <label class="CroakleField">
          <span>Description</span>
          <textarea id="CroakleHabitDetailDescription" name="habitDescription" rows="3" placeholder="e.g., 10 push ups"></textarea>
        </label>

        <fieldset class="CroaklePriorityField">
          <legend>Priority</legend>
          <label><input type="radio" name="habitPriority" value="high" /><span>High</span></label>
          <label><input type="radio" name="habitPriority" value="medium" /><span>Medium</span></label>
          <label><input type="radio" name="habitPriority" value="low" /><span>Low</span></label>
        </fieldset>

        <button class="CroakleConfirmHabitButton" type="submit">Update</button>
      </form>
    </dialog>
  </main>

  <script src="app.js"></script>
  <script src="mood-bridge.js"></script>
</body>
</html>
